<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LAST ZONE - Side Panel</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="sp-header">
    <div class="sp-brand">
      <img class="sp-brand-logo" src="assets/logo-master-lovable-square.png" alt="LAST ZONE"><span class="sp-brand-text">LAST ZONE</span>
      <span class="sp-badge">3.8.2</span>
    </div>
    <div class="sp-header-actions">
      <div class="ql-lang-sw" id="sp-lang-sw">
        <button class="ql-lang-btn ql-lang-active" data-lang="en">EN</button>
        <button class="ql-lang-btn" data-lang="ar">AR</button>
      </div>

      <button class="sp-icon-btn sp-notif-btn" data-i18n-title="header.notifications" title="Notifications">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="sp-notif-badge" style="display:none">0</span>
      </button>
      <button class="sp-icon-btn sp-theme-btn" data-i18n-title="header.theme" title="Theme">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="sp-icon-btn sp-logout-btn" data-i18n-title="header.logout" title="Sign Out"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
    </div>
  </div>
  
  <div class="sp-body" id="sp-body">
    <div class="sp-license-gate" id="sp-loading" style="padding:40px 0;text-align:center">
      <p style="color:var(--ql-text-muted)" data-i18n="loading">⏳ Loading...</p>
    </div>
  </div>

  <div class="sp-footer">
    <button class="sp-back-to-popup" id="sp-back-to-popup" title="Back to floating mode" data-i18n="sp.backToPopup">
      ◀ Popup
    </button>
    
    <span class="sp-footer-badge">LAST ZONE - v3.8.2</span>
  </div>

  <div class="sp-notif-panel" id="sp-notif-panel" style="display:none">
    <div class="sp-notif-header">
      <span data-i18n="notif.title">Notifications</span>
      <div style="display:flex;gap:6px;align-items:center;">
        <button id="sp-notif-markread" data-i18n-title="notif.markRead" title="Mark all as read" style="background:none;border:none;cursor:pointer;font-size:11px;color:var(--ql-text-muted);padding:2px 6px;border-radius:4px;">Read</button>
        <button class="sp-notif-close" id="sp-notif-close">x</button>
      </div>
    </div>
    <div class="sp-notif-list" id="sp-notif-list">
      <p class="sp-notif-empty" data-i18n="notif.loading">Loading...</p>
    </div>
  </div>

  <script src="../bridge.js"></script>
  <script src="jszip.min.js"></script>
  <script src="hwFingerprint.js"></script>
  <script src="i18n.js"></script>
  <script src="branding-overrides.js"></script>
  <script src="sidepanel-templates.js"></script>
  <script src="sounds.js"></script>
  <script src="legacy-license-bridge.js"></script>
  <script src="sidepanel.js"></script>
  <script src="license-fix.js"></script>
</body>
</html>
